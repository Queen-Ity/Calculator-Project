<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
     <!-- Modal -->
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="staticBackdropLabel">Sign up</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <div class="login-container">
              <div class="video">
                <video autoplay muted loop playsinline>
                  <source src="images/calculator-video.mp4" type="video/mp4" />
                </video>
              </div>
              <div class="login">
                <div class="texts">
                  <img
                    src="images/new-calculator.png"
                    style="height: 120px; display: block; width: 100px"
                    alt="Calculator image"
                  />
                  <h4 style="color: white; margin-top: -5px;">Welcome to our Platform!!!</h4>
                  
                  <input type="text" placeholder="Username" />
                  <input type="Email" placeholder="Email" />
                  <input type="password" placeholder="Password">
                  <button style="width:100%;padding:9px; background-color: blue;border-radius:9px; border: 1px solid #000b2c; color: white; font-weight: bold;">Create an account</button>
                  <p style="color: gray; font-size: 13px; margin: 10px">OR</p>
                  <span class="signUp">Already have an account?</span><a href="Login.html" style="color: blue;"> Sign In</a> <br>
                  <a href="index.html" style="color: white;">Back to home</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
</body>
</html>
