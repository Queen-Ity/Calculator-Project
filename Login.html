<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="login-page">
   <header class="header">
      <nav class="nav-container">
        <a
          href="index.html"
          class="home"
          style="
            font-weight: bolder;
            font-family: Arial, sans-serif;
            font-size: 20px;
          "
          >Take-Home PayCalculator
        </a>
      </nav>
    </header>
    <div class="login-container">
      <div class="video">
        <video autoplay muted loop playsinline>
          <source src="images/calculator-video.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="login">
        <div class="texts">
          <img
            src="images/new-calculator.png"
            style="height: 120px; display: block; width: 100px"
            alt="Calculator image"
          />
          <h2 style="color: white; margin-top: -5px;">Welcome to our Platform!!!</h2>
          <p style="color:blue; font-size:15px;margin-top:-15px;font-weight: bold;">SIGN IN</p>
          <input type="Email" placeholder="Email address" />
          <input type="password" placeholder="password" />
          <div class="remember">
            <label> <input type="checkbox" checked />Remember me </label>
            <a href="#">Forgot password</a>
          </div>
          <button style="width:40%;padding:9px; background-color: blue;border-radius:9px; border: 1px solid #000b2c; color: white; font-weight: bold;">Sign In</button>
          <p style="color: gray; font-size: 13px;">OR</p>
          <button style="background-color: #000b2c; color: white;border: 1px solid blue;border-radius: 9px;
        padding:9px;">Continue with Google</button>
          <p class="signUp">Don't have an account?<a href="signup.html" style="color: blue;"> Sign Up</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
